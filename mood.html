<!DOCTYPE html>
<html>
<head>
  <title>Mood Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Mood Tracker</h1>
  <button onclick="toggleDark()">🌙</button>
</header>

<div class="container">
  <h2>How do you feel?</h2>

  <button onclick="setMood(1)">😊 Happy</button>
  <button onclick="setMood(2)">😐 Neutral</button>
  <button onclick="setMood(3)">😞 Stressed</button>

  <p id="result"></p>

  <a href="index.html">⬅ Back</a>
</div>

<script src="script.js"></script>
</body>
</html>
